<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Didn't Read — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Settings</h1>

      <form id="settings-form">
        <label for="api-key">API key</label>
        <input id="api-key" type="password" autocomplete="off" placeholder="sk-…" />
        <p class="hint security">
          Your API key is stored only in this browser (<code>chrome.storage.local</code>).
          It is sent directly to your chosen LLM provider and nowhere else. Anyone with access
          to this computer can read extension storage.
        </p>

        <label for="provider-url">Provider URL</label>
        <input id="provider-url" type="url" placeholder="https://api.openai.com/v1" />

        <label for="model">Model</label>
        <input id="model" type="text" placeholder="gpt-4o-mini" />

        <label for="max-chunk-tokens">Max chunk tokens (long docs)</label>
        <input id="max-chunk-tokens" type="number" min="500" max="8000" step="100" />

        <label for="temperature">Temperature</label>
        <input id="temperature" type="number" min="0" max="1" step="0.1" />

        <div class="buttons">
          <button type="submit">Save</button>
          <button type="button" id="validate-btn">Validate key</button>
          <button type="button" id="clear-key-btn">Clear API key</button>
        </div>
      </form>

      <p id="save-status" class="status" hidden></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
