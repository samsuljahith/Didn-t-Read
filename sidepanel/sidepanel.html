<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Didn't Read</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header>
      <h1>Didn't Read</h1>
      <p class="tagline">Legal doc summaries, plain English.</p>
    </header>

    <section id="consent-screen" class="consent-screen" hidden>
      <h2>Privacy consent</h2>
      <ul id="consent-disclosure" class="consent-disclosure"></ul>
      <div class="consent-actions">
        <button id="consent-accept" type="button">Accept</button>
        <button id="consent-decline" type="button" class="secondary">Decline</button>
      </div>
    </section>

    <p id="consent-declined" class="consent-declined" hidden>
      Analysis is disabled until you accept the privacy consent above.
    </p>

    <p id="api-key-banner" class="banner" hidden>
      No API key configured.
      <a id="options-link" href="#">Add one in Settings</a>
    </p>

    <section id="analysis-actions" class="actions">
      <button id="summarize-btn" type="button">Summarize this page</button>
      <button id="reanalyze-btn" type="button" class="secondary" title="Skip cache and call the LLM again">
        Re-analyze
      </button>
      <button id="cancel-btn" type="button" class="secondary" hidden>Cancel</button>
    </section>

    <div id="progress" class="progress" hidden>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <p id="progress-label" class="progress-label"></p>
    </div>

    <div id="status" class="status" role="alert" hidden></div>

    <section id="meta" class="meta" hidden></section>
    <section id="summary" class="summary" hidden></section>

    <script src="../lib/consent.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
